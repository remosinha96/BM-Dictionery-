<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Dictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="https://remosingh.in/wp-content/uploads/2026/03/Picsart_26-03-03_05-16-35-309.png" alt="Logo" class="logo" referrerPolicy="no-referrer">
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Type to search (Roman, Bangla, or English)..." autofocus autocomplete="off">
        </div>
        <div id="result-container" class="result-container">
            <p class="empty-state">Type a word above to see its meaning.</p>
        </div>
    </div>
    <script src="src/script.js"></script>
</body>
</html>
